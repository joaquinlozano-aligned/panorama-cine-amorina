name: Scrape diario

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC = 09:00 Buenos Aires, todos los días
  workflow_dispatch:        # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write           # para commitear data.json / history.json

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Scrapear perfiles
        run: node scrape.mjs

      - name: Commitear cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos."
          else
            git commit -m "Datos: snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
